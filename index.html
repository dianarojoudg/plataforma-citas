<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultorio Médico - Sistema de Citas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Consultorio Médico</h1>
            <p>Sistema de Registro y Visualización de Pacientes</p>
        </header>

        <main>
            <section class="form-section">
                <h2>📝 Registrar Nuevo Paciente</h2>
                <form id="citaForm">
                    <div class="form-group">
                        <label for="nombre">Nombre Completo:</label>
                        <input type="text" id="nombre" name="nombre" required 
                               placeholder="Ej: Juan Pérez González">
                    </div>

                    <div class="form-group">
                        <label for="telefono">Número Telefónico:</label>
                        <input type="tel" id="telefono" name="telefono" required 
                               placeholder="Ej: 55-1234-5678">
                    </div>

                    <div class="form-group">
                        <label for="fecha">Fecha de la Cita:</label>
                        <input type="date" id="fecha" name="fecha" required>
                    </div>

                    <div class="form-group">
                        <label for="hora">Hora de la Cita:</label>
                        <input type="time" id="hora" name="hora" required>
                    </div>

                    <div class="form-group">
                        <label for="motivo">Motivo de la Consulta:</label>
                        <textarea id="motivo" name="motivo" rows="3" 
                                  placeholder="Describa brevemente el motivo de la consulta"></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Registrar Cita</button>
                </form>
            </section>

            <section class="list-section">
                <h2>📋 Lista de Pacientes Registrados</h2>
                <div class="search-bar">
                    <input type="text" id="buscador" placeholder="Buscar por nombre o teléfono...">
                </div>
                <div class="table-container">
                    <table id="tablaPacientes">
                        <thead>
                            <tr>
                                <th>Nombre Completo</th>
                                <th>Teléfono</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Motivo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaPacientes">
                            <!-- Los pacientes se cargarán aquí dinámicamente -->
                        </tbody>
                    </table>
                </div>
                
                <div class="stats-container">
                    <div class="stat-card">
                        <h3>Total Pacientes</h3>
                        <p id="totalPacientes">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Citas Hoy</h3>
                        <p id="citasHoy">0</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
